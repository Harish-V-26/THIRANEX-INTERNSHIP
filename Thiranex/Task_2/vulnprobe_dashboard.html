<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VulnProbe — Vulnerability Assessment Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:       #080C10;
    --surface:  #0D1117;
    --panel:    #161B22;
    --border:   #21262D;
    --border2:  #30363D;
    --text:     #E6EDF3;
    --subtext:  #8B949E;
    --muted:    #484F58;
    --accent:   #58A6FF;
    --green:    #3FB950;
    --critical: #FF4444;
    --high:     #FF8C00;
    --medium:   #FFD700;
    --low:      #4FC3F7;
    --info:     #81C784;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── GRID BG ── */
  .grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13,17,23,0.95);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #1F6FEB);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 20px rgba(88,166,255,0.3);
  }
  .logo-text {
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500;
    color: var(--subtext);
    background: var(--panel);
    border: 1px solid var(--border2);
    padding: 4px 10px; border-radius: 20px;
    letter-spacing: 1px;
  }

  /* ── MAIN ── */
  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  /* ── TARGET CARD ── */
  .target-card {
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    animation: fadeIn 0.4s ease;
  }

  .target-info { display: flex; flex-direction: column; gap: 6px; }
  .target-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--subtext);
    letter-spacing: 2px; text-transform: uppercase;
  }
  .target-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--accent);
  }
  .target-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--subtext);
    display: flex; gap: 20px; flex-wrap: wrap; margin-top: 4px;
  }
  .target-meta span { display: flex; align-items: center; gap: 5px; }

  /* ── RISK GAUGE ── */
  .risk-gauge {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    min-width: 160px;
  }
  .gauge-label {
    font-size: 10px; letter-spacing: 2px; color: var(--subtext);
    text-transform: uppercase;
  }
  .gauge-ring {
    position: relative; width: 100px; height: 100px;
  }
  .gauge-ring svg { transform: rotate(-90deg); }
  .gauge-ring circle {
    fill: none; stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(.23,1,.32,1);
  }
  .gauge-bg { stroke: var(--border2); }
  .gauge-fill { stroke: var(--low); }
  .gauge-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .gauge-score {
    font-size: 26px; font-weight: 800; line-height: 1;
    color: var(--low);
  }
  .gauge-score-label {
    font-size: 9px; color: var(--subtext);
    letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── GRID ── */
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  @media (max-width: 900px) {
    .grid-3 { grid-template-columns: repeat(2,1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    main { padding: 20px; }
    header { padding: 16px 20px; }
  }

  /* ── STAT CARDS ── */
  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: default;
    animation: fadeIn 0.5s ease both;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.critical { border-color: rgba(255,68,68,0.3); }
  .stat-card.critical::before { background: var(--critical); }
  .stat-card.high    { border-color: rgba(255,140,0,0.3); }
  .stat-card.high::before { background: var(--high); }
  .stat-card.medium  { border-color: rgba(255,215,0,0.3); }
  .stat-card.medium::before { background: var(--medium); }
  .stat-card.low     { border-color: rgba(79,195,247,0.3); }
  .stat-card.low::before { background: var(--low); }
  .stat-card.info-c  { border-color: rgba(129,199,132,0.3); }
  .stat-card.info-c::before { background: var(--info); }

  .stat-sev {
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .stat-sev.critical { color: var(--critical); }
  .stat-sev.high     { color: var(--high); }
  .stat-sev.medium   { color: var(--medium); }
  .stat-sev.low      { color: var(--low); }
  .stat-sev.info-c   { color: var(--info); }

  .stat-num {
    font-size: 44px; font-weight: 800; line-height: 1;
    font-family: 'JetBrains Mono', monospace;
  }
  .stat-num.critical { color: var(--critical); }
  .stat-num.high     { color: var(--high); }
  .stat-num.medium   { color: var(--medium); }
  .stat-num.low      { color: var(--low); }
  .stat-num.info-c   { color: var(--info); }

  .stat-desc {
    font-size: 11px; color: var(--subtext); margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--subtext);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before {
    content: '';
    display: block; width: 3px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* ── FILTER TABS ── */
  .filter-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--panel);
    color: var(--subtext);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
  .filter-tab.active-all   { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.1); }
  .filter-tab.active-CRITICAL { border-color: var(--critical); color: var(--critical); background: rgba(255,68,68,0.1); }
  .filter-tab.active-HIGH  { border-color: var(--high);     color: var(--high);     background: rgba(255,140,0,0.1); }
  .filter-tab.active-MEDIUM{ border-color: var(--medium);   color: var(--medium);   background: rgba(255,215,0,0.1); }
  .filter-tab.active-LOW   { border-color: var(--low);      color: var(--low);      background: rgba(79,195,247,0.1); }
  .filter-tab.active-INFO  { border-color: var(--info);     color: var(--info);     background: rgba(129,199,132,0.1); }

  /* ── FINDING CARDS ── */
  .findings-list { display: flex; flex-direction: column; gap: 10px; }

  .finding-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .finding-card:hover { border-color: var(--border2); }

  .finding-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .sev-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 9px; border-radius: 4px;
    text-transform: uppercase; flex-shrink: 0;
  }
  .sev-CRITICAL { background: rgba(255,68,68,0.15);  color: var(--critical); border: 1px solid rgba(255,68,68,0.3); }
  .sev-HIGH     { background: rgba(255,140,0,0.15);  color: var(--high);     border: 1px solid rgba(255,140,0,0.3); }
  .sev-MEDIUM   { background: rgba(255,215,0,0.15);  color: var(--medium);   border: 1px solid rgba(255,215,0,0.3); }
  .sev-LOW      { background: rgba(79,195,247,0.15); color: var(--low);      border: 1px solid rgba(79,195,247,0.3); }
  .sev-INFO     { background: rgba(129,199,132,0.15);color: var(--info);     border: 1px solid rgba(129,199,132,0.3); }

  .finding-title {
    font-size: 13px; font-weight: 600; flex: 1;
    color: var(--text);
  }

  .finding-category {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    background: var(--surface);
    padding: 3px 8px; border-radius: 4px;
    flex-shrink: 0;
  }

  .cve-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    color: var(--critical);
    background: rgba(255,68,68,0.1);
    border: 1px solid rgba(255,68,68,0.25);
    padding: 2px 8px; border-radius: 4px;
  }

  .expand-icon {
    color: var(--muted); font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .finding-card.open .expand-icon { transform: rotate(90deg); }

  .finding-body {
    display: none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }
  .finding-card.open .finding-body { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 10px 16px;
    padding-top: 16px;
  }
  .detail-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--subtext);
    letter-spacing: 1px; text-transform: uppercase;
    padding-top: 2px;
  }
  .detail-value {
    font-size: 13px; color: var(--text); line-height: 1.5;
  }
  .detail-value.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--subtext);
    background: var(--surface);
    padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--border);
    word-break: break-all;
  }
  .detail-value.fix {
    color: var(--green);
    padding: 8px 12px;
    background: rgba(63,185,80,0.05);
    border: 1px solid rgba(63,185,80,0.2);
    border-radius: 6px;
    font-size: 13px;
  }

  /* ── PORTS PANEL ── */
  .ports-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    height: fit-content;
  }
  .port-item {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .port-item:last-child { border-bottom: none; }
  .port-num { color: var(--accent); font-weight: 700; }
  .port-svc { color: var(--text); }
  .port-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  .port-dot.risky { background: var(--high); box-shadow: 0 0 6px var(--high); }

  /* ── CATEGORY CHART ── */
  .category-bar { margin-top: 12px; }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .cat-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--subtext);
    width: 180px; flex-shrink: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cat-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
  .cat-bar-fill {
    height: 100%; border-radius: 3px;
    background: var(--accent);
    transition: width 1s ease;
  }
  .cat-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    width: 20px; text-align: right; flex-shrink: 0;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 16px 40px;
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 40px;
  }
  .footer-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
  }
  .footer-warning {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--high);
    background: rgba(255,140,0,0.08);
    border: 1px solid rgba(255,140,0,0.2);
    padding: 4px 12px; border-radius: 4px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  @keyframes scanline {
    from { top: -5%; }
    to   { top: 105%; }
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .search-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 9px 14px 9px 36px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 13px;
  }
</style>
</head>

    </div>

</main>

// ── SEVERITY COLORS ──
const SEV_COLORS = {
  CRITICAL: '#FF4444', HIGH: '#FF8C00', MEDIUM: '#FFD700',
  LOW: '#4FC3F7', INFO: '#81C784'
};
const HIGH_RISK_PORTS = new Set([23,135,139,445,1433,3306,3389,5900,6379,27017]);

// ── STATE ──
let activeFilter = 'all';
let searchQuery  = '';

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  populateHeader();
  populateStats();
  populateGauge();
  populatePorts();
  populateCategories();
  renderFindings();
  setupFilters();
  setupSearch();
});

function populateHeader() {
  document.getElementById('target-url').textContent = SCAN.target;
  document.getElementById('target-host').textContent = SCAN.host;
  document.getElementById('target-ip').textContent = SCAN.ip;
  document.getElementById('target-duration').textContent = SCAN.duration_sec + 's';
  document.getElementById('target-total').textContent = SCAN.total_findings;
  const dt = new Date(SCAN.scan_time);
  document.getElementById('scantime').textContent =
    dt.toISOString().slice(0,16).replace('T',' ') + ' UTC';
}

function populateStats() {
  const sevs = ['CRITICAL','HIGH','MEDIUM','LOW','INFO'];
  const cls  = ['critical','high','medium','low','info-c'];
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = sevs.map((s,i) => `
    <div class="stat-card ${cls[i]}" style="animation-delay:${i*0.07}s">
      <div class="stat-sev ${cls[i]}">${s}</div>
      <div class="stat-num ${cls[i]}">${SCAN.severity_counts[s] || 0}</div>
      <div class="stat-desc">findings</div>
    </div>
  `).join('');
}

function populateGauge() {
  const score = SCAN.risk_score;
  const label = SCAN.risk_label;
  const color = score >= 80 ? '#FF4444' : score >= 60 ? '#FF8C00'
              : score >= 40 ? '#FFD700' : score >= 20 ? '#4FC3F7' : '#81C784';

  document.getElementById('gauge-score').textContent = score;
  document.getElementById('gauge-score').style.color = color;
  document.getElementById('gauge-label').textContent = label;

  const circ = 263.9;
  const offset = circ - (score / 100) * circ;
  const arc = document.getElementById('gauge-arc');
  arc.style.stroke = color;

  setTimeout(() => {
    arc.style.strokeDashoffset = offset;
  }, 300);
}

function populatePorts() {
  const portServices = {
    21:'FTP',22:'SSH',23:'TELNET',25:'SMTP',53:'DNS',80:'HTTP',
    110:'POP3',143:'IMAP',443:'HTTPS',445:'SMB',
    1433:'MSSQL',3306:'MYSQL',3389:'RDP',5432:'PGSQL',
    5900:'VNC',6379:'REDIS',8080:'HTTP-ALT',27017:'MONGODB'
  };

  const list = document.getElementById('ports-list');
  if (!SCAN.open_ports.length) {
    list.innerHTML = '<div style="color:var(--subtext);font-size:12px;font-family:monospace">No open ports detected</div>';
    return;
  }
  list.innerHTML = SCAN.open_ports.map(p => {
    const risky = HIGH_RISK_PORTS.has(p);
    const svc   = portServices[p] || 'UNKNOWN';
    return `
      <div class="port-item">
        <span><span class="port-num">${p}</span></span>
        <span class="port-svc">${svc}</span>
        <span class="port-dot${risky?' risky':''}"></span>
      </div>`;
  }).join('');
}

function populateCategories() {
  const cats = {};
  SCAN.findings.forEach(f => {
    cats[f.category] = (cats[f.category] || 0) + 1;
  });
  const sorted = Object.entries(cats).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  document.getElementById('category-bars').innerHTML = sorted.map(([name,count]) => `
    <div class="cat-row">
      <div class="cat-name">${name}</div>
      <div class="cat-bar-wrap">
        <div class="cat-bar-fill" style="width:${(count/max*100).toFixed(1)}%"></div>
      </div>
      <div class="cat-count">${count}</div>
    </div>
  `).join('');
}

function renderFindings() {
  const priority = ['CRITICAL','HIGH','MEDIUM','LOW','INFO'];
  let findings = [...SCAN.findings].sort((a,b) =>
    priority.indexOf(a.severity) - priority.indexOf(b.severity));

  if (activeFilter !== 'all')
    findings = findings.filter(f => f.severity === activeFilter);

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    findings = findings.filter(f =>
      f.title.toLowerCase().includes(q) ||
      f.description.toLowerCase().includes(q) ||
      f.category.toLowerCase().includes(q) ||
      (f.cve || '').toLowerCase().includes(q) ||
      f.vuln_id.toLowerCase().includes(q)
    );
  }

  document.getElementById('shown-count').textContent =
    `${findings.length} of ${SCAN.total_findings} shown`;

  document.getElementById('findings-list').innerHTML = findings.map((f,i) => {
    const cve = f.cve ? `<span class="cve-badge">${f.cve}</span>` : '';
    return `
    <div class="finding-card" style="animation-delay:${Math.min(i*0.04,0.5)}s" onclick="toggle(this)">
      <div class="finding-header">
        <span class="sev-badge sev-${f.severity}">${f.severity}</span>
        <span class="finding-title">${f.title}</span>
        ${cve}
        <span class="finding-category">${f.category}</span>
        <span class="expand-icon">▶</span>
      </div>
      <div class="finding-body">
        <div class="detail-grid">
          <div class="detail-label">ID</div>
          <div class="detail-value" style="font-family:monospace;font-size:11px;color:var(--accent)">${f.vuln_id}</div>

          <div class="detail-label">Description</div>
          <div class="detail-value">${f.description}</div>

          ${f.evidence ? `
          <div class="detail-label">Evidence</div>
          <div class="detail-value mono">${f.evidence}</div>` : ''}

          ${f.cve ? `
          <div class="detail-label">CVE</div>
          <div class="detail-value" style="color:var(--critical);font-family:monospace;font-weight:700">${f.cve}</div>` : ''}

          ${f.recommendation ? `
          <div class="detail-label">Fix</div>
          <div class="detail-value fix">✓ ${f.recommendation}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('') || `<div style="color:var(--subtext);font-size:13px;padding:20px 0;text-align:center;font-family:monospace">No findings match your filter.</div>`;
}

function toggle(card) {
  card.classList.toggle('open');
}

function setupFilters() {
  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => {
        b.className = 'filter-tab';
      });
      const f = btn.dataset.filter;
      activeFilter = f;
      btn.className = `filter-tab active-${f}`;
      renderFindings();
    });
  });
}

function setupSearch() {
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderFindings();
  });
}
</script>
